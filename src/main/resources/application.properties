# =========================================
# CLYVO VET API - Configurações
# =========================================
spring.application.name=clyvo-vet-api
server.port=8080

# Perfil ativo (use 'oracle' para produção FIAP, 'h2' para testes locais rápidos)
spring.profiles.active=oracle

# =========================================
# JPA / Hibernate
# =========================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# =========================================
# Flyway (Migrations)
# =========================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# =========================================
# Cache
# =========================================
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterAccess=10m

# =========================================
# Swagger / OpenAPI
# =========================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =========================================
# Logging
# =========================================
logging.level.br.com.fiap.clyvovet=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
