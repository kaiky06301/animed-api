# =========================================
# H2 (testes locais rápidos)
# =========================================
spring.datasource.url=jdbc:h2:mem:animed;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# O schema é criado pelo Flyway (DDL Oracle rodando em H2 MODE=Oracle).
# Desliga a validação do Hibernate apenas neste perfil local: sob H2 os tipos
# NUMBER do Oracle chegam como NUMERIC e o validate acusa falso mismatch com BIGINT.
# Em produção (perfil 'oracle') o ddl-auto=validate continua valendo.
spring.jpa.hibernate.ddl-auto=none
